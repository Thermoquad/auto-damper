# SPDX-License-Identifier: Apache-2.0

# Hardware
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_PIO_RPI_PICO=y

# Serial
CONFIG_SERIAL=y

# Shell
CONFIG_SHELL=y
CONFIG_KERNEL_SHELL=y

# State machine framework
CONFIG_SMF=y

# Logging
CONFIG_LOG=y
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_LOG_RUNTIME_FILTERING=y
CONFIG_LOG_DEFAULT_LEVEL=3

# zbus
CONFIG_ZBUS=y
CONFIG_ZBUS_CHANNEL_NAME=y
CONFIG_ZBUS_OBSERVER_NAME=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_ZBUS_MSG_SUBSCRIBER_NET_BUF_POOL_SIZE=16

# MCUboot — bootloader-aware. Image header offset and the
# bootutil public library (boot_set_pending / boot_write_img_confirmed /
# boot_is_img_confirmed) are required for swap requests and confirm.
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_BOOTLOADER_MODE_SWAP_USING_OFFSET=y
CONFIG_MCUBOOT_BOOTUTIL_LIB=y
# Produce zephyr.signed.confirmed.{bin,hex} — same as signed.* but
# with the MCUboot trailer pre-marked as confirmed. This is what we
# flash to slot0 on initial provisioning so MCUboot recognizes the
# slot as valid and boots it cleanly (without it, "magic=unset" and
# MCUboot reports "Boot source: none").
CONFIG_MCUBOOT_GENERATE_CONFIRMED_IMAGE=y
# bootutil_public uses flash_area_* — needs the flash map subsystem.
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y

# Reboot — needed by the ota shell command after marking the swap.
CONFIG_REBOOT=y

# OTA: HTTP client over TLS for fetching signed images from GitHub
# Releases. Image authenticity comes from MCUboot's ed25519 signature
# verification; TLS just protects against connection hijacking during
# the download (we use TLS_PEER_VERIFY_NONE).
CONFIG_HTTP_CLIENT=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=2
# No session caching — we make one TLS connection per OTA op. Without
# this, sockets_tls references mbedtls_ssl_{get,set}_session which
# require MBEDTLS_SSL_SESSION_TICKETS (extra flash for no benefit).
CONFIG_NET_SOCKETS_TLS_MAX_CLIENT_SESSION_COUNT=0
CONFIG_NET_SOCKETS_TLS_MAX_SESSION_CONTEXTS=2
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=65536
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384
# Pull in actual TLS protocol support (Kconfig MBEDTLS_TLS_VERSION_1_2
# is deprecated; PROTO_TLS1_2 is the canonical one that gates the
# MBEDTLS_SSL_CLI_C symbols sockets_tls relies on).
CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=y
# DFU image manager streams writes into slot1 with progressive erase.
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_BT_DEVICE_NAME="auto-damper"
CONFIG_BT_MAX_CONN=10
CONFIG_BT_LOG_LEVEL_INF=y

# CYW43439 BT shared-bus patches + Pico SDK firmware blobs
CONFIG_ZEPHYR_CYW43_BT=y

# BT buffers — shared-bus transport is slower than UART, need more headroom
CONFIG_BT_L2CAP_TX_BUF_COUNT=12
CONFIG_BT_BUF_ACL_TX_COUNT=12
CONFIG_BT_BUF_ACL_RX_COUNT_EXTRA=8
CONFIG_BT_BUF_EVT_RX_COUNT=16
CONFIG_BT_BUF_ACL_RX_SIZE=200

# Flash Storage
CONFIG_FLASH=y

# NVS for persistent config
CONFIG_NVS=y
CONFIG_NVS_DATA_CRC=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_DHCPV4=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Stack Sizes (WiFi + HTTP need more)
CONFIG_MAIN_STACK_SIZE=5200
CONFIG_SHELL_STACK_SIZE=5200
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048

# Network Buffers
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128
CONFIG_NET_CONTEXT_NET_PKT_POOL=y
CONFIG_NET_MAX_CONTEXTS=32
CONFIG_NET_MAX_CONN=32
# Free closed TCP contexts immediately instead of holding them in
# TIME_WAIT for 2*MSL — otherwise the small context pool exhausts under
# normal browser load (6 parallel asset fetches + WS).
CONFIG_NET_TCP_TIME_WAIT_DELAY=0

# WiFi
CONFIG_WIFI=y
CONFIG_WIFI_LOG_LEVEL_ERR=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000
CONFIG_NET_CONNECTION_MANAGER=y

# Hostname + mDNS
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME_DYNAMIC=y
CONFIG_NET_HOSTNAME="auto-damper"
CONFIG_NET_HOSTNAME_MAX_LEN=63
CONFIG_MDNS_RESPONDER=y

# Hardware Info (for unique hostname suffix)
CONFIG_HWINFO=y

# Network debug
CONFIG_NET_SHELL=y
CONFIG_NET_LOG=y

# HTTP Server
CONFIG_HTTP_PARSER=y
CONFIG_HTTP_PARSER_URL=y
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_MAX_CLIENTS=8
CONFIG_HTTP_SERVER_STACK_SIZE=4096
CONFIG_HTTP_SERVER_MAX_URL_LENGTH=128
CONFIG_HTTP_SERVER_RESOURCE_WILDCARD=y
CONFIG_HTTP_SERVER_WEBSOCKET=y
CONFIG_WEBSOCKET_MAX_CONTEXTS=4

# POSIX File Descriptors
CONFIG_ZVFS_OPEN_MAX=24
CONFIG_ZVFS_POLL_MAX=16
CONFIG_EVENTFD=y
CONFIG_ZVFS_EVENTFD_MAX=4

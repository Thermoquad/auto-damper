# MCUboot Kconfig overlay applied alongside MCUboot's default
# prj.conf. Note: the swap algorithm (swap-using-move / swap-using-
# offset / etc.) is chosen at the sysbuild level via Kconfig choices
# in sysbuild.conf, not here — duplicating it would conflict.

# Verbose-ish log output during bootloader execution. Visible on the
# same UART as the application console.
CONFIG_LOG=y
CONFIG_BOOT_BANNER=y
CONFIG_MCUBOOT_LOG_LEVEL_DBG=y

# Defer log mode lets log lines actually flush before chainload —
# minimal mode (the default) can drop output when the bootloader
# completes faster than the UART can drain.
CONFIG_LOG_MODE_IMMEDIATE=y

# Enable MCUboot as a partner image. west build --sysbuild will build
# MCUboot alongside the application, sign the application image with
# imgtool, and produce signed.bin + signed.confirmed.bin for the
# initial USB/probe flash.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# Sign the application with the ed25519 key in keys/. The same PEM
# file is consumed by both imgtool (private half, for signing) and
# the MCUboot build (public half, baked into the bootloader as the
# trusted verifier key).
#
# ${WEST_TOPDIR} is expanded by MCUboot's CMakeLists via
# string(CONFIGURE) and resolves to the west workspace root on any
# host (local dev, CI runner, anyone's machine). MCUboot's per-image
# APPLICATION_CONFIG_DIR is its own source tree, not the app's, so a
# bare relative path wouldn't find our keys/ dir.
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="${WEST_TOPDIR}/apps/auto-damper/keys/root-ed25519.pem"
SB_CONFIG_BOOT_SIGNATURE_TYPE_ED25519=y

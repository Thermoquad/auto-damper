name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Stop if no new tag
        if: steps.tag.outputs.new_tag == ''
        run: |
          echo "No new tag — no release-worthy commits since last tag. Exiting."
          exit 0

      - name: Check out west manifest (origin)
        if: steps.tag.outputs.new_tag != ''
        uses: actions/checkout@v4
        with:
          repository: Thermoquad/origin
          path: origin

      - name: Check out auto-damper (this repo, this commit)
        if: steps.tag.outputs.new_tag != ''
        uses: actions/checkout@v4
        with:
          path: apps/auto-damper
          ref: ${{ github.sha }}

      - name: Set up Python
        if: steps.tag.outputs.new_tag != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install west + imgtool
        if: steps.tag.outputs.new_tag != ''
        run: |
          pip install --upgrade pip
          pip install west
          pip install pyelftools pyyaml pykwalify canopen packaging progress \
                      psutil click intelhex cryptography ecdsa cbor2
          # imgtool comes from the mcuboot repo we'll fetch via west

      - name: Rewrite SSH URLs to HTTPS for unauthenticated cloning
        if: steps.tag.outputs.new_tag != ''
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: West init + update
        if: steps.tag.outputs.new_tag != ''
        run: |
          west init -l origin
          west update
          echo "=== west projects after update ==="
          west list
          test -d modules/lib/zephyr-cyw43-bt || { echo "ERROR: zephyr-cyw43-bt not fetched"; exit 1; }
          test -d modules/drivers/zephyr-servo-rpi-pio || { echo "ERROR: zephyr-servo-rpi-pio not fetched"; exit 1; }
          pip install -r zephyr/scripts/requirements-base.txt
          pip install -e bootloader/mcuboot/scripts

      - name: Fetch Infineon BT firmware blobs
        if: steps.tag.outputs.new_tag != ''
        run: west blobs fetch hal_infineon

      - name: Install Zephyr SDK
        if: steps.tag.outputs.new_tag != ''
        env:
          SDK_VERSION: 1.0.1
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VERSION}/zephyr-sdk-${SDK_VERSION}_linux-x86_64_minimal.tar.xz
          tar -xJf zephyr-sdk-${SDK_VERSION}_linux-x86_64_minimal.tar.xz
          cd zephyr-sdk-${SDK_VERSION}
          ./setup.sh -t arm-zephyr-eabi -h -c

      - name: Write MCUboot signing key from secret
        if: steps.tag.outputs.new_tag != ''
        env:
          KEY: ${{ secrets.MCUBOOT_SIGNING_KEY }}
        run: |
          mkdir -p apps/auto-damper/keys
          printf '%s\n' "$KEY" > apps/auto-damper/keys/root-ed25519.pem
          chmod 600 apps/auto-damper/keys/root-ed25519.pem

      - name: Build web UI
        if: steps.tag.outputs.new_tag != ''
        run: |
          cd apps/auto-damper/web-src
          # Use whatever Node major is on the runner — vite 6 needs >= 18
          node --version
          npm ci
          npm run build

      - name: Build signed firmware
        if: steps.tag.outputs.new_tag != ''
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr
          ZEPHYR_SDK_INSTALL_DIR: ${{ github.workspace }}/zephyr-sdk-1.0.1
          VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          cd apps/auto-damper
          west build -b rpi_pico2/rp2350a/m33/w --sysbuild \
            -- -DCONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="${VERSION}+0"

      - name: Generate manifest.json
        if: steps.tag.outputs.new_tag != ''
        env:
          VERSION: ${{ steps.tag.outputs.new_version }}
          TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          BIN=apps/auto-damper/build/auto-damper/zephyr/zephyr.signed.bin
          SIZE=$(stat -c '%s' "$BIN")
          SHA256=$(sha256sum "$BIN" | cut -d' ' -f1)
          cat > manifest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/auto-damper-${VERSION}.signed.bin",
            "size": ${SIZE},
            "sha256": "${SHA256}"
          }
          EOF
          cp "$BIN" "auto-damper-${VERSION}.signed.bin"
          cp apps/auto-damper/build/auto-damper/zephyr/zephyr.signed.confirmed.hex \
             "auto-damper-${VERSION}.signed.confirmed.hex"
          cp apps/auto-damper/build/mcuboot/zephyr/zephyr.hex "mcuboot-${VERSION}.hex"
          echo "--- manifest ---"
          cat manifest.json

      - name: Publish release
        if: steps.tag.outputs.new_tag != ''
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          artifacts: "manifest.json,auto-damper-*.signed.bin,auto-damper-*.signed.confirmed.hex,mcuboot-*.hex"
